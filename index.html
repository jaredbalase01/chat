<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook in iframe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f2f5;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
            padding: 20px 20px 10px 20px;
            max-width: 900px;
            width: 100%;
            transition: all 0.2s ease;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e4e6eb;
        }

        .card-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1b1f23;
            letter-spacing: -0.3px;
        }

        .fb-icon {
            width: 36px;
            height: 36px;
            background: #1877f2;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1.4rem;
            box-shadow: 0 2px 6px rgba(24, 119, 242, 0.3);
        }

        .iframe-container {
            position: relative;
            width: 100%;
            padding-bottom: 75%; /* 4:3 aspect ratio – good for desktop FB */
            height: 0;
            overflow: hidden;
            border-radius: 16px;
            background: #e4e6eb;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.04);
        }

        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
            border-radius: 12px;
            background: white;
            /* allow scrolling inside iframe (some browsers need this) */
            overflow: auto;
        }

        .footnote {
            margin-top: 16px;
            font-size: 0.85rem;
            color: #65676b;
            text-align: center;
            letter-spacing: 0.2px;
            padding: 6px 0 2px 0;
            border-top: 1px solid #e4e6eb;
        }

        .footnote a {
            color: #1877f2;
            text-decoration: none;
            font-weight: 500;
        }

        .footnote a:hover {
            text-decoration: underline;
        }

        /* small screens */
        @media (max-width: 600px) {
            .card {
                padding: 14px 14px 8px 14px;
            }
            .card-header h1 {
                font-size: 1.2rem;
            }
            .iframe-container {
                padding-bottom: 100%; /* square on mobile – better for vertical feed */
            }
        }

        /* taller screens (like mobile landscape) */
        @media (max-height: 700px) and (min-width: 500px) {
            .iframe-container {
                padding-bottom: 60%;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- header with Facebook branding -->
        <div class="card-header">
            <div class="fb-icon">f</div>
            <h1>Facebook · embedded</h1>
        </div>

        <!-- iframe wrapper – keeps responsive ratio -->
        <div class="iframe-container">
            <iframe 
                src="https://www.facebook.com/plugins/page.php?href=https%3A%2F%2Fwww.facebook.com%2Ffacebook&tabs=timeline&width=500&height=600&small_header=false&adapt_container_width=true&hide_cover=false&show_facepile=true&appId"
                allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share"
                allowfullscreen="true"
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"
                title="Facebook embedded timeline"
                sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-modals"
            ></iframe>
        </div>

        <!-- small note: facebook iframe limitations -->
        <div class="footnote">
            ⚡ Facebook iframe • 
            <a href="https://www.facebook.com/facebook" target="_blank" rel="noopener">facebook.com/facebook</a> 
            <span style="margin:0 6px;">·</span> 
            <span style="opacity:0.7;">(some features may be restricted by Facebook)</span>
        </div>
    </div>
</body>
  </html>
